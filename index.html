<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Bing每日高清壁纸</title>
		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
			}
			body {
				background: #f5f5f5;
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}
			.wrapper {
				width: 90%;
				max-width: 1200px;
				margin: 30px auto 0;
			}
			h1 {
				font-size: 24px;
				text-align: center;
				padding-bottom: 20px;
				color: #333;
			}

			.year-tabs {
				margin-bottom: 15px;
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
			}
			.year-tabs a {
				padding: 8px 16px;
				background: #fff;
				border: 1px solid #ddd;
				border-radius: 6px;
				color: #666;
				text-decoration: none;
				font-size: 14px;
				cursor: pointer;
				transition: all 0.2s;
			}
			.year-tabs a:hover {
				background: #f0f0f0;
			}
			.year-tabs a.on {
				background: #3a64ff;
				color: #fff;
				border-color: #3a64ff;
			}
			.year-tabs a.info-btn {
				background: #ff9800;
				color: #fff;
				border-color: #ff9800;
			}

			.month-tabs {
				margin-bottom: 20px;
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				padding: 12px;
				background: #fff;
				border-radius: 8px;
			}
			.month-tabs a {
				padding: 6px 12px;
				background: #f5f5f5;
				border-radius: 4px;
				color: #666;
				text-decoration: none;
				font-size: 13px;
				cursor: pointer;
				transition: all 0.2s;
			}
			.month-tabs a:hover {
				background: #e8e8e8;
			}
			.month-tabs a.on {
				background: #3a64ff;
				color: #fff;
			}

			.image-list {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
				gap: 15px;
				padding: 20px;
				background: #fff;
				border-radius: 8px;
			}
			.image-item {
				text-align: center;
				cursor: pointer;
				transition: transform 0.2s;
			}
			.image-item:hover {
				transform: scale(1.02);
			}
			.image-item img {
				width: 100%;
				height: 120px;
				object-fit: cover;
				border-radius: 6px;
			}
			.image-item p {
				margin-top: 8px;
				font-size: 12px;
				color: #999;
			}

			.info-list {
				background: #fff;
				padding: 30px;
				border-radius: 8px;
			}
			.info-list li {
				line-height: 2;
				color: #666;
				font-size: 14px;
			}
		</style>
	</head>
	<body>
		<div class="wrapper">
			<h1>Bing每日高清壁纸</h1>
			<div class="holder">
				<div
					class="year-tabs"
					id="year-tabs"></div>
				<div
					class="tabs-content"
					id="tabs-content"></div>
			</div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>

		<script>
			var CONFIG = {
				projectStartDate: "2022-12-21",
				imagePath: "//in-static.ddup.in/images",
				placeholderImage:
					"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjEyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZWVlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNGRjYwNjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+",
			};

			var projectDate = moment(CONFIG.projectStartDate);
			var currentYear = moment().year();
			var currentMonth = (moment().month() + 1).toString().padStart(2, "0");
			var currentViewer = null;

			function init() {
				renderYearTabs();
				loadImages(currentYear, currentMonth);
			}

			function renderYearTabs() {
				var html = '<a class="info-btn" data-id="info">项目说明</a>';
				var startYear = projectDate.year();
				var endYear = moment().year();

				for (var year = endYear; year >= startYear; year--) {
					var active = year === currentYear ? ' class="on"' : "";
					html += "<a" + active + ' data-year="' + year + '">' + year + "</a>";
				}

				$("#year-tabs").html(html);
			}

			function renderMonthTabs(year, activeMonth) {
				var html = "";
				var maxMonth = 12;
				var startMonth = 1;

				if (year === moment().year()) {
					maxMonth = moment().month() + 1;
				}
				if (year === projectDate.year()) {
					startMonth = projectDate.month() + 1;
				}

				for (var month = maxMonth; month >= startMonth; month--) {
					var m = month.toString().padStart(2, "0");
					var active = m === activeMonth ? ' class="on"' : "";
					html +=
						"<a" +
						active +
						' data-year="' +
						year +
						'" data-month="' +
						m +
						'">' +
						month +
						"月</a>";
				}

				return html;
			}

			function loadImages(year, month) {
				currentYear = year;
				currentMonth = month;

				if (currentViewer) {
					currentViewer.destroy();
					currentViewer = null;
				}

				var monthTabsHtml = renderMonthTabs(year, month);
				$("#tabs-content").html(
					'<div class="month-tabs">' +
						monthTabsHtml +
						'</div><div class="image-list" id="image-list"></div>',
				);

				var listHtml = "";
				var startDate = moment(year + "-" + month + "-01").endOf("month");
				var endDate = moment(year + "-" + month + "-01");

				if (
					year === moment().year() &&
					month === (moment().month() + 1).toString().padStart(2, "0")
				) {
					startDate = moment();
				}

				var count = 0;
				while (startDate.isSameOrAfter(endDate) && count < 40) {
					var dateStr = startDate.format("YYYY-MM-DD");
					var imgUrl =
						CONFIG.imagePath + "/" + startDate.format("YYYY/MM/DD") + ".jpg";
					listHtml +=
						'<div class="image-item"><img src="' +
						imgUrl +
						'" data-src="' +
						imgUrl +
						'" alt="' +
						dateStr +
						'" onerror="this.src=\'' +
						CONFIG.placeholderImage +
						"'\"><p>" +
						dateStr +
						"</p></div>";

					if (dateStr === projectDate.format("YYYY-MM-DD")) break;
					startDate.subtract(1, "days");
					count++;
				}

				$("#image-list").html(listHtml);

				currentViewer = new Viewer(document.getElementById("image-list"), {
					url: "data-src",
					toolbar: true,
					zoomable: true,
					rotatable: true,
					scalable: true,
					fullscreen: true,
					keyboard: true,
				});
			}

			function showInfo() {
				if (currentViewer) {
					currentViewer.destroy();
					currentViewer = null;
				}
				$("#tabs-content").html(
					'<ul class="info-list"><li>在免费的vercel.com上部署一个node的serverless服务，获取bing.cn当天的背景图片</li><li>在免费的github.com上新建一个项目bingHtml项目，并配置好api权限，使得vercel上的服务可以通过token提交文件到bingHtml项目</li><li>在免费的github.com上新建一个bingcn项目，利用action workflows每天定时运行vercel上的项目，即保存下来每天的高清图片</li><li>设置bingHtml为公开项目，根据图片命名规则编写本页显示代码</li></ul>',
				);
			}

			$(function () {
				init();

				$("#year-tabs").on("click", "a[data-year]", function () {
					var year = parseInt($(this).attr("data-year"));
					$("#year-tabs a").removeClass("on");
					$(this).addClass("on");

					var nowYear = moment().year();
					var projectYear = projectDate.year();
					var firstMonth;

					if (year === nowYear) {
						firstMonth = (moment().month() + 1).toString().padStart(2, "0");
					} else if (year === projectYear) {
						firstMonth = (projectDate.month() + 1).toString().padStart(2, "0");
					} else {
						firstMonth = "12";
					}

					loadImages(year, firstMonth);
					return false;
				});

				$("#year-tabs").on("click", 'a[data-id="info"]', function () {
					$("#year-tabs a").removeClass("on");
					$(this).addClass("on");
					showInfo();
					return false;
				});

				$("#tabs-content").on(
					"click",
					".month-tabs a[data-month]",
					function () {
						var year = parseInt($(this).attr("data-year"));
						var month = $(this).attr("data-month");

						$(".month-tabs a").removeClass("on");
						$(this).addClass("on");

						loadImages(year, month);
						return false;
					},
				);
			});
		</script>
	</body>
</html>
